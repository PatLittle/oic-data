# Build stable CSV exports directly from the scraped JSON files.
#
# NB, differences in format between this and output of `oic-analysis` (which runs against the HTML):
# - pcNumber and htmlHash column names remain in camelCase
# - attachments is a stringified JSON array
# - year and number are not extracted from pcNumber
# - department is not processed after extraction, department_raw is not created
# - text column (html_text2 of the html column) is not created
name: Produce CSV from JSON order tables

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Scrape latest orders and attachments]
    types:
      - completed

jobs:
  update-csvs-from-json:
    runs-on: ubuntu-latest
    steps:
    - name: Check out this repo
      uses: actions/checkout@v4
    - name: Build CSV exports from JSON
      run: |-
        python3 scripts/build-csv-from-json.py
    - name: Build SQLite database
      run: |-
        python3 scripts/build-sqlite-db.py \
          --order-whitespace collapse \
          --attachment-whitespace collapse \
          --no-secondary-indexes
    - name: Check SQLite size
      id: sqlite_size
      run: |-
        db_bytes=$(stat -c%s processed-csvs/oic-data.sqlite)
        echo "db_bytes=${db_bytes}" >> "$GITHUB_OUTPUT"
        if [ "$db_bytes" -le 104857600 ]; then
          echo "store_in_repo=true" >> "$GITHUB_OUTPUT"
        else
          echo "store_in_repo=false" >> "$GITHUB_OUTPUT"
        fi
    - name: Upload SQLite artifact
      if: steps.sqlite_size.outputs.store_in_repo != 'true'
      uses: actions/upload-artifact@v4
      with:
        name: oic-data-sqlite
        path: processed-csvs/oic-data.sqlite
        if-no-files-found: error

    - name: Commit and push if it changed
      run: |-
        git config user.name "Automated"
        git config user.email "actions@users.noreply.github.com"
        git add processed-csvs/orders.csv processed-csvs/orders-html.csv
        git add processed-csvs/attachments.csv processed-csvs/attachments-html.csv.gz
        if [ "${{ steps.sqlite_size.outputs.store_in_repo }}" = "true" ]; then
          git add processed-csvs/oic-data.sqlite
        fi
        timestamp=$(date -u)
        git commit -m "CSV from JSON as of: ${timestamp}" || exit 0
        git push
